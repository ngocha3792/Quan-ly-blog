<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manager Portal | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/dark-mode.css">
  <style>
    body.manager-auth-bg {
      background: radial-gradient(circle at 10% 20%, rgba(90, 92, 106, 1) 0%, rgba(32, 34, 47, 1) 90%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: #f8f9fa;
      font-family: 'Roboto', sans-serif;
    }

    .manager-card {
      background: rgba(26, 32, 63, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      max-width: 440px;
      width: 100%;
      margin: auto;
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.08) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #fff !important;
      transition: all 0.3s ease;
    }

    .glass-input:focus {
      background: rgba(255, 255, 255, 0.15) !important;
      border-color: #00e5ff !important;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.25) !important;
    }

    .btn-manager {
      background: linear-gradient(135deg, #00e5ff, #0b74de);
      border: none;
      color: #fff;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-manager:hover {
      background: linear-gradient(135deg, #00c6d7, #095db2);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 229, 255, 0.3);
      color: #fff;
    }

    .badge-portal {
      background: rgba(0, 229, 255, 0.1);
      color: #00e5ff;
      border: 1px solid rgba(0, 229, 255, 0.2);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>

<body class="manager-auth-bg">

  <main class="container py-5">
    <div class="manager-card card p-4 p-md-5">
      <div class="text-center mb-4">
        <a class="text-decoration-none fw-bold fs-3 text-white" href="../public/index.html">
          <i class="bi bi-braces-asterisk me-2 text-info"></i>DevBlog
        </a>
        <div class="mt-2">
          <span class="badge badge-portal px-3 py-1 rounded-pill">Management Portal</span>
        </div>
      </div>

      <div class="alert alert-danger d-none" id="error-alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span id="error-msg">Email hoặc máº­t khẩu không chính xác!</span>
      </div>

      <form id="manager-login-form" onsubmit="handleManagerLogin(event)">
        <div class="mb-3">
          <label class="form-label small text-secondary">Email quản lý</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control glass-input border-start-0" placeholder="admin@devblog.com" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small text-secondary">Máº­t khẩu</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control glass-input border-start-0" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-manager w-100 py-2.5 mb-3">ÄÄƒng nháº­p</button>

        <div class="text-center">
          <a href="../public/index.html" class="text-decoration-none text-secondary small hover-text-white transition">
            <i class="bi bi-arrow-left me-1"></i> Quay lại trang chá»§
          </a>
        </div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script>
    function handleManagerLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorAlert = document.getElementById('error-alert');
      const errorMsg = document.getElementById('error-msg');

      errorAlert.classList.add('d-none');

      // Hardcoded moderator & admin accounts
      if (email === 'mod@devblog.com' && password === '123456') {
        localStorage.setItem('demoRole', 'moderator');
        localStorage.setItem('demoUserEmail', email);
        localStorage.setItem('demoUserName', 'Content Moderator');
        window.location.href = 'moderator/dashboard.html';
      } else if (email === 'admin@devblog.com' && password === '123456') {
        localStorage.setItem('demoRole', 'admin');
        localStorage.setItem('demoUserEmail', email);
        localStorage.setItem('demoUserName', 'Super Admin');
        window.location.href = 'admin/dashboard.html';
      } else {
        errorMsg.innerText = "Email hoặc máº­t khẩu không chính xác hoặc không có quyá»n truy cập quản lý!";
        errorAlert.classList.remove('d-none');
      }
    }

    // Auto redirect if already logged in as manager
    document.addEventListener("DOMContentLoaded", () => {
      const role = localStorage.getItem('demoRole');
      if (role === 'admin') {
        window.location.href = 'admin/dashboard.html';
      } else if (role === 'moderator') {
        window.location.href = 'moderator/dashboard.html';
      }
    });
  </script>
</body>

</html>
