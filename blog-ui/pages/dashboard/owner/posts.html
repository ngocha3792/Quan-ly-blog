<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage My Posts | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="../../../assets/css/components.css">
  <link rel="stylesheet" href="../../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../../assets/css/dark-mode.css">
</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4>
      <a class="" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="active" href="posts.html"><i class="bi bi-file-earmark-text"></i>Bài viết của tôi</a>
      <a class="" href="create-post.html"><i class="bi bi-plus-circle"></i>Tạo bài viết</a>
      <hr class="border-secondary">
      <a href="../../public/index.html"><i class="bi bi-house"></i>Về trang public</a>
    </aside>
    
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Manage My Posts</strong>
          <div class="small text-muted">Owner dashboard</div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" data-theme-toggle>
            <i class="bi bi-moon-stars"></i>
          </button>
          <span class="avatar-sm">S</span>
        </div>
      </header>
      
      <section class="dashboard-content">
        <div class="d-flex justify-content-between mb-3">
          <h3 class="fw-bold">Bài viết của tôi</h3>
          <a class="btn btn-primary shadow-sm" href="create-post.html">
            <i class="bi bi-plus-lg me-1"></i> Tạo bài viết
          </a>
        </div>
        <div class="card table-card border-0 shadow-sm">
          <table class="table align-middle mb-0 table-hover-custom">
            <thead>
              <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Language</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="fw-medium">Thiết kế Blog đa ngôn ngữ</td>
                <td>Backend</td>
                <td><span class="badge bg-secondary-subtle text-secondary-emphasis border">VI</span></td>
                <td><span class="badge bg-success rounded-pill px-3 py-1">PUBLISHED</span></td>
                <td>
                  <a href="edit-post.html" class="btn btn-sm btn-outline-primary border-0 me-1 action-btn" title="Chỉnh sửa">
                    <i class="bi bi-pencil-square"></i>
                  </a>
                  <button class="btn btn-sm btn-outline-danger border-0 action-btn" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa bài viết này?');">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                </td>
              </tr>
              <tr>
                <td class="fw-medium">Angular Interceptor</td>
                <td>Frontend</td>
                <td><span class="badge bg-secondary-subtle text-secondary-emphasis border">EN</span></td>
                <td><span class="badge bg-secondary rounded-pill px-3 py-1">DRAFT</span></td>
                <td>
                  <a href="edit-post.html" class="btn btn-sm btn-outline-primary border-0 me-1 action-btn" title="Chỉnh sửa">
                    <i class="bi bi-pencil-square"></i>
                  </a>
                  <button class="btn btn-sm btn-outline-danger border-0 action-btn" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa bản nháp này?');">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
      </section>
    </main>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
</body>

</html>
