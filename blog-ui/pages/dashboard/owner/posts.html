<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage My Posts | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/blog-ui/assets/css/style.css">

</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4><a class=""
        href="/blog-ui/pages/dashboard/owner/dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a><a
        class="active" href="/blog-ui/pages/dashboard/owner/posts.html"><i class="bi bi-file-earmark-text"></i>Bài viết
        của tôi</a><a class="" href="/blog-ui/pages/dashboard/owner/create-post.html"><i class="bi bi-plus-circle"></i>Tạo bài viết</a>
      <hr class="border-secondary"><a href="/blog-ui/pages/public/index.html"><i class="bi bi-house"></i>Về trang
        public</a>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Manage My Posts</strong>
          <div class="small text-muted">Owner dashboard</div>
        </div>
        <div class="d-flex align-items-center gap-2"><button class="btn btn-sm btn-outline-secondary"
            data-theme-toggle><i class="bi bi-moon-stars"></i></button><span class="avatar-sm">S</span></div>
      </header>
      <section class="dashboard-content">
        <div class="d-flex justify-content-between mb-3">
          <h3 class="fw-bold">Bài viết của tôi</h3><a class="btn btn-primary" href="/blog-ui/pages/dashboard/owner/create-post.html">Tạo bài viết</a>
        </div>
        <div class="table-card">
          <table class="table align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Language</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Thiết kế Blog đa ngôn ngữ</td>
                <td>Backend</td>
                <td>VI</td>
                <td><span class="badge bg-success">PUBLISHED</span></td>
                <td><a href="/blog-ui/pages/dashboard/owner/edit-post.html">Edit</a></td>
              </tr>
              <tr>
                <td>Angular Interceptor</td>
                <td>Frontend</td>
                <td>EN</td>
                <td><span class="badge bg-secondary">DRAFT</span></td>
                <td><a href="/blog-ui/pages/dashboard/owner/edit-post.html">Edit</a></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/blog-ui/assets/js/main.js"></script>

</html>
