<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Post | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="../../../assets/css/components.css">
  <link rel="stylesheet" href="../../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../../assets/css/dark-mode.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <style>
    /* CSS giúp Quill Editor tương thích với Dark Mode */
    .dark-mode .ql-toolbar,
    [data-bs-theme="dark"] .ql-toolbar {
      background-color: #2b2b40;
      border-color: #474761 !important;
    }
    .dark-mode .ql-toolbar button,
    [data-bs-theme="dark"] .ql-toolbar button {
      filter: invert(1);
    }
    .dark-mode .ql-container,
    [data-bs-theme="dark"] .ql-container {
      background-color: #1e1e2d;
      border-color: #474761 !important;
      color: #e4e6ef;
    }
    .dark-mode .ql-editor.ql-blank::before,
    [data-bs-theme="dark"] .ql-editor.ql-blank::before {
      color: #6c757d;
    }
  </style>
</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4>
      <a class="" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="active" href="posts.html"><i class="bi bi-file-earmark-text"></i>Bài viết của tôi</a>
      <a class="" href="create-post.html"><i class="bi bi-plus-circle"></i>Tạo bài viết</a>
      <hr class="border-secondary">
      <a href="../../public/index.html"><i class="bi bi-house"></i>Về trang public</a>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Edit Post</strong>
          <div class="small text-muted">Owner dashboard</div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" data-theme-toggle>
            <i class="bi bi-moon-stars"></i>
          </button>
          <span class="avatar-sm">S</span>
        </div>
      </header>

      <section class="dashboard-content">
        <div class="card soft-card">
          <div class="card-body p-4">
            <h3 class="fw-bold mb-4">Sửa bài viết</h3>
            
            <form id="postForm">
              <div class="row g-3">
                <div class="col-md-8">
                  <label class="form-label">Title <span class="text-danger">*</span></label>
                  <input type="text" id="postTitle" class="form-control" placeholder="Nhập tiêu đề..." required>
                </div>
                
                <div class="col-md-4">
                  <label class="form-label">Language</label>
                  <div class="dropdown">
                    <button id="langDropdownBtn" class="form-select text-start d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                      <img src="https://flagcdn.com/w20/vn.png" alt="VN" style="width: 20px;"> <span>VI</span>
                    </button>
                    <ul class="dropdown-menu w-100" id="langOptions">
                      <li><a class="dropdown-item d-flex align-items-center gap-2" href="#" data-lang="VI" data-flag="vn.png"><img src="https://flagcdn.com/w20/vn.png" alt="VN" style="width: 20px;"> VI</a></li>
                      <li><a class="dropdown-item d-flex align-items-center gap-2" href="#" data-lang="EN" data-flag="gb.png"><img src="https://flagcdn.com/w20/gb.png" alt="EN" style="width: 20px;"> EN</a></li>
                    </ul>
                  </div>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Categories</label>
                  <select id="postCategories" class="form-select" multiple style="height: 100px;">
                    <option value="Backend">Backend</option>
                    <option value="Frontend">Frontend</option>
                    <option value="Database">Database</option>
                  </select>
                  <small class="text-muted">Giữ Ctrl (hoặc Cmd) để chọn nhiều</small>
                </div>
                
                <div class="col-md-6">
                  <label class="form-label">Hashtags</label>
                  <input type="text" id="postHashtags" class="form-control" placeholder="#tag1 #tag2">
                </div>
                
                <div class="col-md-6">
                  <label class="form-label">Ảnh bìa hiện tại</label>
                  <div class="mb-2 text-primary small" id="currentThumbnailInfo">Đang dùng: <i class="bi bi-image"></i> thumbnail_cu.jpg</div>
                  <input type="file" id="postThumbnail" class="form-control" accept="image/*">
                  <small class="text-muted">Chọn ảnh mới để thay thế ảnh cũ</small>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Video đính kèm hiện tại</label>
                  <div class="mb-2 text-primary small" id="currentVideoInfo">Chưa có video đính kèm</div>
                  <input type="file" id="postVideo" class="form-control" accept="video/mp4,video/webm,video/ogg">
                  <small class="text-muted">Chọn video mới để cập nhật</small>
                </div>
                
                <div class="col-12">
                  <label class="form-label">Content <span class="text-danger">*</span></label>
                  <div>
                    <div id="editor-container" style="height: 350px;"></div>
                  </div>
                </div>
              </div>
              
              <div class="mt-4 d-flex gap-2">
                <button type="button" id="btnPublish" class="btn btn-primary px-4"><i class="bi bi-check2-circle me-1"></i> Cập nhật</button>
                <button type="button" id="btnCancel" class="btn btn-outline-secondary px-4"><i class="bi bi-x-circle me-1"></i> Hủy thay đổi</button>
              </div>
            </form>

          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">Thông báo ở đây!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // 1. Khởi tạo Quill
      var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Bắt đầu viết nội dung...',
        modules: {
          toolbar: [
            [{ 'header': [1, 2, 3, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            ['blockquote', 'code-block'],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            [{ 'color': [] }, { 'background': [] }],
            ['link', 'image', 'video'],
            ['clean']
          ]
        }
      });

      // -------------------------------------------------------------
      // 2. MOCK DATA: GIẢ LẬP GỌI API LẤY DỮ LIỆU CŨ CỦA BÀI VIẾT
      // -------------------------------------------------------------
      const existingPostData = {
        title: "Thiết kế Blog đa ngôn ngữ",
        language: "VI",
        categories: ["Backend", "Database"],
        hashtags: "#mysql #i18n #backend",
        thumbnailName: "blog-banner-vn.jpg",
        videoName: null, // Giả sử bài này chưa có video
        content: `
          <h2>1. Vấn đề đặt ra</h2>
          <p>Khi xây dựng một hệ thống bài viết hỗ trợ nhiều ngôn ngữ, chúng ta cần cân nhắc cấu trúc Database sao cho tối ưu nhất.</p>
          <ul>
            <li>Cách 1: Thêm cột cho từng ngôn ngữ (title_vi, title_en).</li>
            <li>Cách 2: Tạo bảng riêng cho Translation.</li>
          </ul>
        `
      };

      // 3. ĐỔ DỮ LIỆU CŨ VÀO FORM
      let currentLang = existingPostData.language;

      // - Tiêu đề & Hashtags
      document.getElementById('postTitle').value = existingPostData.title;
      document.getElementById('postHashtags').value = existingPostData.hashtags;

      // - Nút Dropdown Ngôn ngữ
      const langDropdownBtn = document.getElementById('langDropdownBtn');
      if (currentLang === 'EN') {
        langDropdownBtn.innerHTML = `<img src="https://flagcdn.com/w20/gb.png" alt="EN" style="width: 20px;"> <span>EN</span>`;
      } else {
        langDropdownBtn.innerHTML = `<img src="https://flagcdn.com/w20/vn.png" alt="VN" style="width: 20px;"> <span>VI</span>`;
      }

      // - Categories (Select multiple)
      const categorySelect = document.getElementById('postCategories');
      Array.from(categorySelect.options).forEach(option => {
        if (existingPostData.categories.includes(option.value)) {
          option.selected = true;
        }
      });

      // - Thông tin File hiện tại
      if(existingPostData.thumbnailName) {
        document.getElementById('currentThumbnailInfo').innerHTML = `Đang dùng: <i class="bi bi-image"></i> ${existingPostData.thumbnailName}`;
      }
      if(existingPostData.videoName) {
        document.getElementById('currentVideoInfo').innerHTML = `Đang dùng: <i class="bi bi-film"></i> ${existingPostData.videoName}`;
      }

      // - Đổ HTML cũ vào Quill Editor
      // Sử dụng dangerouslyPasteHTML để giữ nguyên định dạng HTML cũ
      quill.clipboard.dangerouslyPasteHTML(existingPostData.content);


      // -------------------------------------------------------------
      // 4. LOGIC XỬ LÝ SỰ KIỆN GIAO DIỆN & CẬP NHẬT
      // -------------------------------------------------------------

      // Xử lý đổi ngôn ngữ
      const langItems = document.querySelectorAll('#langOptions .dropdown-item');
      langItems.forEach(item => {
        item.addEventListener('click', function(e) {
          e.preventDefault();
          const lang = this.getAttribute('data-lang');
          const flag = this.getAttribute('data-flag');
          currentLang = lang;
          langDropdownBtn.innerHTML = `<img src="https://flagcdn.com/w20/${flag}" alt="${lang}" style="width: 20px;"> <span>${lang}</span>`;
        });
      });

      // Toast Notification
      const toastEl = document.getElementById('liveToast');
      const toastMessage = document.getElementById('toastMessage');
      const toast = new bootstrap.Toast(toastEl);

      function showToast(message, type = 'success') {
        toastMessage.innerText = message;
        toastEl.className = `toast align-items-center text-white border-0 bg-${type}`;
        toast.show();
      }

      // Xử lý Lưu (Cập nhật)
      document.getElementById('btnPublish').addEventListener('click', function() {
        const title = document.getElementById('postTitle').value.trim();
        const hashtags = document.getElementById('postHashtags').value.trim();
        const selectedCategories = Array.from(categorySelect.selectedOptions).map(opt => opt.value);
        
        // Kiểm tra xem user có chọn file mới không, nếu không thì lấy file cũ
        const thumbInput = document.getElementById('postThumbnail');
        const videoInput = document.getElementById('postVideo');
        const finalThumbnail = thumbInput.files.length > 0 ? thumbInput.files[0].name : existingPostData.thumbnailName;
        const finalVideo = videoInput.files.length > 0 ? videoInput.files[0].name : existingPostData.videoName;

        const contentHtml = quill.root.innerHTML;
        const contentText = quill.getText().trim();

        if (!title) {
          showToast('Vui lòng nhập tiêu đề bài viết!', 'danger');
          document.getElementById('postTitle').focus();
          return;
        }
        if (contentText.length === 0) {
          showToast('Vui lòng nhập nội dung bài viết!', 'danger');
          quill.focus();
          return;
        }

        const updatedData = {
          title: title,
          language: currentLang,
          categories: selectedCategories,
          hashtags: hashtags,
          thumbnailName: finalThumbnail,
          videoName: finalVideo,
          content: contentHtml
        };

        console.log("🚀 Dữ liệu CẬP NHẬT chuẩn bị gửi đi:", updatedData);
        showToast('✅ Đã cập nhật bài viết thành công!', 'success');
      });

      // Xử lý nút Hủy
      document.getElementById('btnCancel').addEventListener('click', function() {
        if(confirm('Bạn có chắc muốn hủy các thay đổi? Giao diện sẽ quay lại Danh sách bài viết.')) {
          window.location.href = 'posts.html';
        }
      });
    });
  </script>
</body>
</html>
