<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Post | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/style.css">

</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4><a class=""
        href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a><a class=""
        href="posts.html"><i class="bi bi-file-earmark-text"></i>Bài viết của tôi</a><a class="active"
        href="create-post.html"><i class="bi bi-plus-circle"></i>Tạo bài viết</a>
      <hr class="border-secondary"><a href="../../public/index.html"><i class="bi bi-house"></i>Về trang
        public</a>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Create Post</strong>
          <div class="small text-muted">Owner dashboard</div>
        </div>
        <div class="d-flex align-items-center gap-2"><button class="btn btn-sm btn-outline-secondary"
            data-theme-toggle><i class="bi bi-moon-stars"></i></button><span class="avatar-sm">S</span></div>
      </header>
      <section class="dashboard-content">
        <div class="card soft-card">
          <div class="card-body p-4">
            <h3 class="fw-bold mb-4">Tạo/Sửa bài viết</h3>
            <div class="row g-3">
              <div class="col-md-8"><label class="form-label">Title</label><input class="form-control"
                  placeholder="Nhập tiêu đề"></div>
              <div class="col-md-4"><label class="form-label">Language</label><select class="form-select">
                  <option>VI</option>
                  <option>EN</option>
                </select></div>
              <div class="col-md-6"><label class="form-label">Categories</label><select class="form-select" multiple>
                  <option>Backend</option>
                  <option>Frontend</option>
                  <option>Database</option>
                </select></div>
              <div class="col-md-6"><label class="form-label">Hashtags</label><input class="form-control"
                  value="#nodejs #angular"></div>
              <div class="col-12"><label class="form-label">Thumbnail</label><input class="form-control" type="file">
              </div>
              <div class="col-12"><label class="form-label">Content</label><textarea class="form-control" rows="12"
                  placeholder="Nội dung bài viết..."></textarea></div>
            </div>
            <div class="mt-4 d-flex gap-2"><button class="btn btn-primary">Lưu</button><button
                class="btn btn-outline-secondary">Lưu nháp</button></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
</body>
</html>
