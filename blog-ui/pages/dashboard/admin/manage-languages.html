<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Languages | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="../../../assets/css/components.css">
  <link rel="stylesheet" href="../../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../../assets/css/dark-mode.css">
</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4>
      <a class="" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="" href="manage-users.html"><i class="bi bi-people"></i>Quản lý users</a>
      <a class="active" href="manage-languages.html"><i class="bi bi-translate"></i>Quản lý languages</a>
      <hr class="border-secondary">
      <a href="../../public/index.html"><i class="bi bi-house"></i>Về trang public</a>
    </aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Manage Languages</strong>
          <div class="small text-muted">Admin dashboard</div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" data-theme-toggle>
            <i class="bi bi-moon-stars"></i>
          </button>
          <span class="avatar-sm">S</span>
        </div>
      </header>

      <section class="dashboard-content">
        <div class="d-flex justify-content-between mb-3">
          <h3 class="fw-bold">Languages</h3>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addLanguageModal">
            <i class="bi bi-plus-circle me-2"></i>Thêm language
          </button>
        </div>

        <div class="table-card">
          <table class="table align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Default</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="fw-bold text-uppercase">vi</td>
                <td>Tiếng Việt</td>
                <td><span class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle px-2 py-1"><i
                      class="bi bi-star-fill me-1"></i> Default</span></td>
                <td><span class="badge bg-success rounded-pill px-3 py-2">ACTIVE</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-warning border-0 me-1" title="Chỉnh sửa" data-bs-toggle="modal"
                    data-bs-target="#editLanguageModal">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger border-0" title="Xóa"
                    onclick="return confirm('Bạn có chắc chắn muốn xóa ngôn ngữ này?');">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                </td>
              </tr>
              <tr>
                <td class="fw-bold text-uppercase">en</td>
                <td>English</td>
                <td><span class="text-muted">-</span></td>
                <td><span class="badge bg-success rounded-pill px-3 py-2">ACTIVE</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-warning border-0 me-1" title="Chỉnh sửa" data-bs-toggle="modal"
                    data-bs-target="#editLanguageModal">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger border-0" title="Xóa"
                    onclick="return confirm('Bạn có chắc chắn muốn xóa ngôn ngữ này?');">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                </td>
              </tr>
              <tr>
                <td class="fw-bold text-uppercase">ja</td>
                <td>Japanese</td>
                <td><span class="text-muted">-</span></td>
                <td><span class="badge bg-secondary rounded-pill px-3 py-2">INACTIVE</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-warning border-0 me-1" title="Chỉnh sửa" data-bs-toggle="modal"
                    data-bs-target="#editLanguageModal">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger border-0" title="Xóa"
                    onclick="return confirm('Bạn có chắc chắn muốn xóa ngôn ngữ này?');">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="modal fade" id="addLanguageModal" tabindex="-1" aria-labelledby="addLanguageModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="addLanguageModalLabel">Thêm Ngôn ngữ mới</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formAddLanguage">
            <div class="mb-3">
              <label for="langCode" class="form-label">Mã ngôn ngữ (Code)</label>
              <input type="text" class="form-control" id="langCode" placeholder="VD: vi, en, fr..." required>
            </div>
            <div class="mb-3">
              <label for="langName" class="form-label">Tên hiển thị</label>
              <input type="text" class="form-control" id="langName" placeholder="VD: Tiếng Việt" required>
            </div>
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" role="switch" id="isDefaultLang">
              <label class="form-check-label" for="isDefaultLang">Đặt làm ngôn ngữ mặc định (Default)</label>
            </div>
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" role="switch" id="isActiveLang" checked>
              <label class="form-check-label" for="isActiveLang">Kích hoạt ngay (Active)</label>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" form="formAddLanguage" class="btn btn-primary">Lưu ngôn ngữ</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editLanguageModal" tabindex="-1" aria-labelledby="editLanguageModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="editLanguageModalLabel">Chỉnh sửa Ngôn ngữ</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formEditLanguage">
            <div class="mb-3">
              <label for="editLangCode" class="form-label">Mã ngôn ngữ (Code)</label>
              <input type="text" class="form-control" id="editLangCode" value="vi" required>
            </div>
            <div class="mb-3">
              <label for="editLangName" class="form-label">Tên hiển thị</label>
              <input type="text" class="form-control" id="editLangName" value="Tiếng Việt" required>
            </div>
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" role="switch" id="editIsDefaultLang" checked>
              <label class="form-check-label" for="editIsDefaultLang">Đặt làm ngôn ngữ mặc định (Default)</label>
            </div>
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" role="switch" id="editIsActiveLang" checked>
              <label class="form-check-label" for="editIsActiveLang">Kích hoạt ngay (Active)</label>
            </div>
          </form>
        </div>
        <div class="modal-footer border-top-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" form="formEditLanguage" class="btn btn-primary">Cập nhật</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
</body>

</html>
