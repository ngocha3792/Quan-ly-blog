<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4>
      <a class="active" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="" href="manage-users.html"><i class="bi bi-people"></i>Quản lý users</a>
      <a class="" href="manage-languages.html"><i class="bi bi-translate"></i>Quản lý languages</a>
      <hr class="border-secondary">
      <a href="../../index.html"><i class="bi bi-house"></i>Về trang public</a>
    </aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Admin Dashboard</strong>
          <div class="small text-muted">Admin overview & analytics</div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" data-theme-toggle>
            <i class="bi bi-moon-stars"></i>
          </button>
          <span class="avatar-sm">S</span>
        </div>
      </header>

      <section class="dashboard-content">
        <div class="row g-3 mb-4">
          <div class="col-md-3">
            <div class="card stat-card border-0 shadow-sm">
              <div class="card-body">
                <div class="text-muted small">Users</div>
                <h3 class="fw-bold mb-0">320</h3>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card border-0 shadow-sm">
              <div class="card-body">
                <div class="text-muted small">Blog Owners</div>
                <h3 class="fw-bold mb-0">42</h3>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card border-0 shadow-sm">
              <div class="card-body">
                <div class="text-muted small">Languages</div>
                <h3 class="fw-bold mb-0">3</h3>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card border-0 shadow-sm">
              <div class="card-body">
                <div class="text-muted small">Pending requests</div>
                <h3 class="fw-bold mb-0 text-warning">5</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-lg-8">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-header bg-white fw-bold border-bottom-0 pt-3 pb-0">
                Tăng trưởng người dùng (7 ngày qua)
              </div>
              <div class="card-body">
                <canvas id="userGrowthChart" height="100"></canvas>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-header bg-white fw-bold border-bottom-0 pt-3 pb-0">
                Thao tác nhanh
              </div>
              <div class="card-body">
                <div class="d-grid gap-2">
                    <a href="manage-users.html" class="btn btn-primary text-start">
                      <i class="bi bi-journal-check me-2"></i>Duyệt yêu cầu (5) 
                    </a>
                    <a href="manage-languages.html" class="btn btn-outline-secondary text-start">
                      <i class="bi bi-folder-plus me-2"></i>Thêm Language
                    </a>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-header bg-white fw-bold border-bottom-0 pt-3 pb-0">
                Phân bổ Blog theo ngôn ngữ
              </div>
              <div class="card-body">
                <canvas id="langPieChart"></canvas>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
          </div>
        </div>

      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // 1. Biểu đồ đường (Line Chart) - Tăng trưởng người dùng
      const ctxLine = document.getElementById('userGrowthChart').getContext('2d');
      new Chart(ctxLine, {
        type: 'line',
        data: {
          labels: ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'],
          datasets: [{
            label: 'Người dùng mới',
            data: [12, 19, 15, 25, 22, 30, 38],
            borderColor: '#0d6efd',
            backgroundColor: 'rgba(13, 110, 253, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });

      // 2. Biểu đồ tròn (Doughnut Chart) - Phân bổ ngôn ngữ
      const ctxPie = document.getElementById('langPieChart').getContext('2d');
      new Chart(ctxPie, {
        type: 'doughnut',
        data: {
          labels: ['Tiếng Việt', 'Tiếng Anh', 'Ngôn ngữ khác'],
          datasets: [{
            data: [60, 30, 10],
            backgroundColor: [
              '#0d6efd',
              '#ffc107',
              '#6c757d'
            ],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          cutout: '70%',
          plugins: {
            legend: {
              position: 'bottom'
            }
          }
        }
      });
    });
  </script>
</body>
</html>
