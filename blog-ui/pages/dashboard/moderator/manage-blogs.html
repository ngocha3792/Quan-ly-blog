<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Blogs | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="../../../assets/css/components.css">
  <link rel="stylesheet" href="../../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../../assets/css/dark-mode.css">

</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4>
      <a class="" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="active" href="manage-blogs.html"><i class="bi bi-journal-text"></i>Duyệt blogs</a>
      <a class="" href="manage-comments.html"><i class="bi bi-chat-left-text"></i>Quản lý comments</a>
      <a class="" href="manage-categories.html"><i class="bi bi-folder"></i>Quản lý categories</a>
      <hr class="border-secondary">
      <a href="../../public/index.html"><i class="bi bi-house"></i>Về trang public</a>
      <a href="../../public/auth.html" class="text-danger"><i class="bi bi-box-arrow-right"></i>Đăng xuất</a>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Pending Blogs</strong>
          <div class="small text-muted">Phê duyệt bài viết</div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary border-0" data-theme-toggle title="Đổi giao diện">
            <i class="bi bi-moon-stars"></i>
          </button>
          <span class="avatar-sm">S</span>
          <a href="../../public/auth.html" class="btn btn-sm btn-outline-danger ms-1" title="Đăng xuất" onclick="return confirm('Bạn có chắc chắn muốn đăng xuất?');">
            <i class="bi bi-box-arrow-right"></i>
          </a>
        </div>
      </header>
      <section class="dashboard-content">
        <div class="card table-card border-0 shadow-sm">
          <table class="table align-middle mb-0 table-hover">
            <thead>
              <tr>
                <th>Tiêu đề</th>
                <th>Tác giả</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="fw-medium">Hướng dẫn học ReactJS cơ bản cho người mới</td>
                <td>User A</td>
                <td><span class="badge bg-warning-subtle text-warning-emphasis">Chờ duyệt</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-success border-0 me-1" title="Duyệt bài"
                    onclick="if(confirm('Xác nhận duyệt bài viết này?')) alert('Đã duyệt bài viết thành công!');">
                    <i class="bi bi-check-circle-fill"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger border-0 me-1" title="Từ chối"
                    onclick="if(confirm('Bạn có chắc chắn muốn từ chối bài viết này?')) alert('Đã từ chối bài viết!');">
                    <i class="bi bi-x-circle-fill"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-warning border-0 me-1" title="Yêu cầu chỉnh sửa"
                    onclick="alert('Đã gửi yêu cầu chỉnh sửa tới tác giả!');">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                </td>
              </tr>
              <tr>
                <td class="fw-medium">10 mẹo tối ưu hiệu suất với CSS</td>
                <td>DevMaster</td>
                <td><span class="badge bg-warning-subtle text-warning-emphasis">Chờ duyệt</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-success border-0 me-1" title="Duyệt bài"
                    onclick="if(confirm('Xác nhận duyệt bài viết này?')) alert('Đã duyệt bài viết thành công!');">
                    <i class="bi bi-check-circle-fill"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger border-0 me-1" title="Từ chối"
                    onclick="if(confirm('Bạn có chắc chắn muốn từ chối bài viết này?')) alert('Đã từ chối bài viết!');">
                    <i class="bi bi-x-circle-fill"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-warning border-0 me-1" title="Yêu cầu chỉnh sửa"
                    onclick="alert('Đã gửi yêu cầu chỉnh sửa tới tác giả!');">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
</body>

</html>
