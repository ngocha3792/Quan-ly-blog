<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Blogs | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/blog-ui/assets/css/style.css">

</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4><a class=""
        href="/blog-ui/pages/dashboard/moderator/dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a><a class="active"
        href="/blog-ui/pages/dashboard/moderator/manage-blogs.html"><i class="bi bi-journal-text"></i>Quản lý blogs</a><a class=""
        href="/blog-ui/pages/dashboard/moderator/manage-comments.html"><i class="bi bi-chat-left-text"></i>Quản lý comments</a><a class=""
        href="/blog-ui/pages/dashboard/moderator/manage-categories.html"><i class="bi bi-folder"></i>Quản lý categories</a>
      <hr class="border-secondary"><a href="/blog-ui/pages/public/index.html"><i class="bi bi-house"></i>Về trang
        public</a>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Manage Blogs</strong>
          <div class="small text-muted">Moderator dashboard</div>
        </div>
        <div class="d-flex align-items-center gap-2"><button class="btn btn-sm btn-outline-secondary"
            data-theme-toggle><i class="bi bi-moon-stars"></i></button><span class="avatar-sm">S</span></div>
      </header>
      <section class="dashboard-content">
        <div class="table-card">
          <table class="table align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Blog</th>
                <th>Author</th>
                <th>Reason</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Bài viết spam</td>
                <td>User A</td>
                <td>Spam link</td>
                <td>
                  <button class="btn btn-sm btn-outline-danger border-0 me-1" title="Xóa"
                    onclick="return confirm('Bạn có chắc chắn muốn xóa bài viết này không?');">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-warning border-0" title="Yêu cầu chỉnh sửa"
                    onclick="alert('Đã gửi yêu cầu chỉnh sửa tới chủ blog!');">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                </td>
              </tr>
              <tr>
                <td>Nội dung sai chuẩn</td>
                <td>Owner B</td>
                <td>Vi phạm</td>
                <td>
                  <button class="btn btn-sm btn-outline-danger border-0 me-1" title="Xóa"
                    onclick="return confirm('Bạn có chắc chắn muốn xóa bài viết này không?');">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-warning border-0" title="Yêu cầu chỉnh sửa"
                    onclick="alert('Đã gửi yêu cầu chỉnh sửa tới chủ blog!');">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/blog-ui/assets/js/main.js"></script>
</body>

</html>
