<!doctype html>
<html lang="vi">
  
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Categories | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="../../../assets/css/components.css">
  <link rel="stylesheet" href="../../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../../assets/css/dark-mode.css">
</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4>
      <a class="" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="" href="manage-blogs.html"><i class="bi bi-journal-text"></i>Quản lý blogs</a>
      <a class="" href="manage-comments.html"><i class="bi bi-chat-left-text"></i>Quản lý comments</a>
      <a class="active" href="manage-categories.html"><i class="bi bi-folder"></i>Quản lý categories</a>
      <hr class="border-secondary">
      <a href="../../public/index.html"><i class="bi bi-house"></i>Về trang public</a>
       <a href="../../public/auth.html" class="text-danger" onclick="return confirm('Bạn có chắc chắn muốn đăng xuất?');">
        <i class="bi bi-box-arrow-right"></i>Đăng xuất
      </a>
    </aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Manage Categories</strong>
          <div class="small text-muted">Quản lý danh mục</div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" data-theme-toggle><i class="bi bi-moon-stars"></i></button>
          <span class="avatar-sm">S</span>
          <a href="../../public/auth.html" class="btn btn-sm btn-outline-danger ms-1" title="Đăng xuất" onclick="return confirm('Bạn có chắc chắn muốn đăng xuất?');">
            <i class="bi bi-box-arrow-right"></i>
          </a>
        </div>
      </header>

      <section class="dashboard-content">
        <div class="d-flex justify-content-between mb-3">
          <h3 class="fw-bold">Danh mục</h3>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCategoryModal">Thêm
            danh mục</button>
        </div>

        <div class="card table-card border-0 shadow-sm">
          <table class="table align-middle mb-0 table-hover">
            <thead>
              <tr>
                <th>Tên</th>
                <th class="col-w-md text-nowrap text-center">Ngôn ngữ</th>
                <th class="col-w-sm text-nowrap text-center">Bài viết</th>
                <th class="col-w-actions text-nowrap text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody id="categories-table-body">
              <!-- Render by JS -->
            </tbody>
          </table>
        </div>
        
        <div class="mt-4">
          <nav>
            <ul class="pagination justify-content-center" id="categories-pagination">
              <!-- Pagination rendered by JS -->
            </ul>
          </nav>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal Danh sách bài viết của Category -->
  <div class="modal fade" id="categoryPostsModal" tabindex="-1" aria-labelledby="categoryPostsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="categoryPostsModalLabel">Danh sách bài viết: <span id="categoryPostsName" class="text-primary"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="list-group" id="categoryPostsList">
            <!-- Render by JS -->
          </div>
        </div>
        <div class="modal-footer border-top-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Form khi bấm vào nút hình bút chì(Chỉnh sửa Category) trên Action -->
  <div class="modal fade" id="editCategoryModal" tabindex="-1" aria-labelledby="editCategoryModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="editCategoryModalLabel">Chỉnh sửa Category</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formEditCategory">
            <div class="mb-3">
              <label for="editCategoryName" class="form-label">Tên Category</label>
              <input type="text" class="form-control" id="editCategoryName" value="Backend" required>
            </div>
            <div class="mb-3">
              <label for="editCategoryLang" class="form-label">Ngôn ngữ</label>
              <select class="form-select" id="editCategoryLang">
                <option value="VI" selected>Tiếng Việt (VI)</option>
                <option value="EN">Tiếng Anh (EN)</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer border-top-0">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" form="formEditCategory" class="btn btn-primary">Cập nhật</button>
        </div>
      </div>
    </div>
  </div>
// Form khi bấm vào nút Thêm Category
  <div class="modal fade" id="addCategoryModal" tabindex="-1" aria-labelledby="addCategoryModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="addCategoryModalLabel">Thêm Category Mới</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formAddCategory" action="" method="post">
            <div class="mb-3">
              <label for="categoryName" class="form-label">Tên Category</label>
              <input type="text" class="form-control" id="categoryName" placeholder="VD: Backend, Frontend..." required>
            </div>
            <div class="mb-3">
              <label for="categoryLang" class="form-label">Ngôn ngữ</label>
              <select class="form-select" id="categoryLang">
                <option value="VI" selected>Tiếng Việt (VI)</option>
                <option value="EN">Tiếng Anh (EN)</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer border-top-0">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" form="formAddCategory" class="btn btn-primary">Lưu Category</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      
      // 1. Xử lý Form Thêm Category
      const formAdd = document.getElementById('formAddCategory');
      if (formAdd) {
        formAdd.addEventListener('submit', function (e) {
          e.preventDefault(); // CHẶN HÀNH VI LOAD LẠI TRANG GÂY LỖI 404
          
          // Lấy tên category vừa nhập để in ra thông báo cho xịn
          const catName = document.getElementById('categoryName').value;
          
          // Đóng Modal Thêm
          const addModalEl = document.getElementById('addCategoryModal');
          const addModal = bootstrap.Modal.getInstance(addModalEl) || new bootstrap.Modal(addModalEl);
          addModal.hide();

          // Hiện thông báo Mock
          alert(`Mock: Đã thêm Category "${catName}" thành công!`);
          
          // Xóa trắng form để lần sau mở lên nhập tiếp
          formAdd.reset();
        });
      }

      // 2. Xử lý Form Cập nhật Category (để không bị dính lỗi tương tự)
      const formEdit = document.getElementById('formEditCategory');
      if (formEdit) {
        formEdit.addEventListener('submit', function (e) {
          e.preventDefault(); // CHẶN LỖI 404
          
          // Đóng Modal Sửa
          const editModalEl = document.getElementById('editCategoryModal');
          const editModal = bootstrap.Modal.getInstance(editModalEl) || new bootstrap.Modal(editModalEl);
          editModal.hide();

          // Hiện thông báo Mock
          alert('Mock: Cập nhật Category thành công!');
        });
      }

      // 3. Mock Data & Render Danh mục
      const baseCategories = [
        { name: 'Backend', lang: 'VI', langFlag: 'vn', postCount: 24 },
        { name: 'Frontend', lang: 'EN', langFlag: 'gb', postCount: 18 },
        { name: 'Database', lang: 'VI', langFlag: 'vn', postCount: 9 },
        { name: 'DevOps', lang: 'EN', langFlag: 'gb', postCount: 15 }
      ];

      let categoriesMockData = [];
      for (let i = 0; i < 25; i++) {
        let cat = { ...baseCategories[i % baseCategories.length] };
        cat.id = i + 1;
        cat.name = `${cat.name} ${i + 1}`;
        categoriesMockData.push(cat);
      }

      let currentPage = 1;
      const itemsPerPage = 8;

      function renderCategories() {
        const tbody = document.getElementById("categories-table-body");
        if (!tbody) return;
        
        let htmlString = "";
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const currentCats = categoriesMockData.slice(startIndex, endIndex);

        currentCats.forEach(cat => {
          htmlString += `
              <tr>
                <td class="fw-medium">
                  <a href="#" class="text-decoration-none text-dark post-title" onclick="showCategoryPosts('${cat.name}')">${cat.name}</a>
                </td>
                <td class="text-nowrap text-center">
                  <span class="badge bg-light text-dark border lang-badge rounded-pill d-inline-flex align-items-center gap-1 px-2 py-1">
                    <img src="https://flagcdn.com/w20/${cat.langFlag}.png" alt="${cat.lang}" style="width: 16px; border-radius: 2px;"> ${cat.lang}
                  </span>
                </td>
                <td class="text-nowrap text-center">${cat.postCount}</td>
                <td class="text-nowrap text-center">
                  <button class="btn btn-sm btn-outline-warning border-0 me-1" title="Chỉnh sửa" data-bs-toggle="modal" data-bs-target="#editCategoryModal">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger border-0" title="Xóa" onclick="if(confirm('Bạn có chắc chắn muốn xóa category này không?')) alert('Đã xóa!');">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                </td>
              </tr>
          `;
        });
        
        tbody.innerHTML = htmlString;
        renderPagination();
      }

      function renderPagination() {
        const paginationWrapper = document.getElementById("categories-pagination");
        if (!paginationWrapper) return;
        
        const totalPages = Math.ceil(categoriesMockData.length / itemsPerPage);
        if (totalPages <= 1) {
          paginationWrapper.innerHTML = '';
          return;
        }

        let paginationHtml = '';
        paginationHtml += `
          <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" data-page="${currentPage - 1}">Previous</a>
          </li>
        `;
        for (let i = 1; i <= totalPages; i++) {
          paginationHtml += `
            <li class="page-item ${currentPage === i ? 'active' : ''}">
              <a class="page-link" href="#" data-page="${i}">${i}</a>
            </li>
          `;
        }
        paginationHtml += `
          <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" data-page="${currentPage + 1}">Next</a>
          </li>
        `;
        paginationWrapper.innerHTML = paginationHtml;
        
        const pageLinks = paginationWrapper.querySelectorAll('.page-link');
        pageLinks.forEach(link => {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            const parent = this.parentElement;
            if (parent.classList.contains('disabled') || parent.classList.contains('active')) return;
            const newPage = parseInt(this.getAttribute('data-page'));
            if (!isNaN(newPage)) {
              currentPage = newPage;
              renderCategories();
            }
          });
        });
      }

      window.showCategoryPosts = function(categoryName) {
        document.getElementById('categoryPostsName').innerText = categoryName;
        
        // Mock 3 posts for this category
        const listWrapper = document.getElementById('categoryPostsList');
        let postsHtml = '';
        for(let i=1; i<=3; i++) {
           postsHtml += `
            <a href="../../public/post-detail.html" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center bg-transparent">
              <div>
                <h6 class="mb-1 fw-bold text-dark">Bài viết demo số ${i} cho danh mục ${categoryName}</h6>
                <small class="text-muted">Tác giả: DevMaster | Xuất bản: 20/07/2026</small>
              </div>
              <span class="badge bg-primary rounded-pill">14 views</span>
            </a>
           `;
        }
        listWrapper.innerHTML = postsHtml;

        const modal = new bootstrap.Modal(document.getElementById('categoryPostsModal'));
        modal.show();
      };

      renderCategories();

    });
  </script>
  
</body>
</html>
