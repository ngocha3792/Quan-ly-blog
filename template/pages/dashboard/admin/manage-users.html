<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Users | DevBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="../../../assets/css/components.css">
  <link rel="stylesheet" href="../../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../../assets/css/dark-mode.css">
</head>

<body class="dashboard-body">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <h4 class="text-white fw-bold mb-4"><i class="bi bi-braces-asterisk me-2"></i>DevBlog</h4>
      <a class="" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="active" href="manage-users.html"><i class="bi bi-people"></i>Quản lý users</a>
      <a class="" href="manage-languages.html"><i class="bi bi-translate"></i>Quản lý languages</a>
      <hr class="border-secondary">
      <a href="../../public/index.html"><i class="bi bi-house"></i>Về trang public</a>
      <a href="../../public/auth.html" class="text-danger" onclick="return confirm('Bạn có chắc chắn muốn đăng xuất?');">
        <i class="bi bi-box-arrow-right"></i>Đăng xuất
      </a>
    </aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><strong>Manage Users</strong>
          <div class="small text-muted">Quản lý người dùng hệ thống </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" data-theme-toggle>
            <i class="bi bi-moon-stars"></i>
          </button>
          <span class="avatar-sm">S</span>
          <a href="../../public/auth.html" class="btn btn-sm btn-outline-danger ms-1" title="Đăng xuất" onclick="return confirm('Bạn có chắc chắn muốn đăng xuất?');">
            <i class="bi bi-box-arrow-right"></i>
          </a>
        </div>
      </header>

      <section class="dashboard-content">
        <div class="d-flex justify-content-between mb-3">
          <h3 class="fw-bold">Users</h3>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModModal">
            <i class="bi bi-person-plus me-2"></i>Tạo Moderator
          </button>
        </div>

        <div class="card table-card border-0 shadow-sm">
          <table class="table align-middle mb-0 table-hover">
            <thead>
              <tr>
                <th>User</th>
                <th class="col-w-lg text-nowrap">Role</th>
                <th class="col-w-md text-nowrap text-center">Trạng thái</th>
                <th class="col-w-lg text-nowrap text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <!-- Render by JS -->
            </tbody>
          </table>
        </div>

        <div class="mt-4">
          <nav>
            <ul class="pagination justify-content-center" id="users-pagination">
              <!-- Pagination rendered by JS -->
            </ul>
          </nav>
        </div>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="modal fade" id="createModModal" tabindex="-1" aria-labelledby="createModModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="createModModalLabel">Tạo tài khoản Moderator</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formCreateMod">
            <div class="mb-3">
              <label for="modEmail" class="form-label">Địa chỉ Email</label>
              <input type="email" class="form-control" id="modEmail" placeholder="mod@example.com" required>
            </div>
            <div class="mb-3">
              <label for="modPassword" class="form-label">Mật khẩu tạm thời</label>
              <input type="password" class="form-control" id="modPassword" placeholder="Nhập mật khẩu cho Moderator"
                required>
              <div class="form-text">Moderator có thể đổi mật khẩu này sau khi đăng nhập.</div>
            </div>
            <div class="mb-3">
              <label for="modNote" class="form-label">Ghi chú (Tùy chọn)</label>
              <textarea class="form-control" id="modNote" rows="2"
                placeholder="Ví dụ: Phụ trách kiểm duyệt mảng Backend..."></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" form="formCreateMod" class="btn btn-primary">Tạo tài khoản</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="userInfoModal" tabindex="-1" aria-labelledby="userInfoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="userInfoModalLabel">Thông tin User: <span id="infoUserEmail" class="text-primary"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row mb-4">
            <div class="col-md-6">
              <p class="mb-1 text-muted small">Vai trò (Role)</p>
              <h6 class="fw-bold" id="infoUserRole"></h6>
            </div>
            <div class="col-md-6">
              <p class="mb-1 text-muted small">Trạng thái</p>
              <h6 class="fw-bold" id="infoUserStatus"></h6>
            </div>
          </div>
          <h6 class="fw-bold border-bottom pb-2 mb-3">Bài viết gần đây</h6>
          <div class="list-group" id="infoUserBlogs">
            <!-- Render by JS -->
          </div>
        </div>
        <div class="modal-footer border-top-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const formMod = document.getElementById('formCreateMod');
      if (formMod) {
        formMod.addEventListener('submit', function (e) {
          e.preventDefault();
          const modalEl = document.getElementById('createModModal');
          const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
          modal.hide();
          alert('Mock: Đã tạo tài khoản Moderator thành công!');
          formMod.reset();
        });
      }

      const baseUsers = [
        { email: 'son@example.com', role: 'NORMAL_USER', roleClass: 'text-secondary', status: 'ACTIVE' },
        { email: 'owner@example.com', role: 'BLOG_OWNER', roleClass: 'text-primary', status: 'ACTIVE' },
        { email: 'mod@example.com', role: 'CONTENT_MODERATOR', roleClass: 'text-danger', status: 'ACTIVE' },
        { email: 'spam@example.com', role: 'NORMAL_USER', roleClass: 'text-secondary', status: 'LOCKED' }
      ];

      let usersMockData = [];
      for (let i = 0; i < 30; i++) {
        let user = { ...baseUsers[i % baseUsers.length] };
        user.id = i + 1;
        user.email = `user${i+1}_${user.email}`;
        usersMockData.push(user);
      }

      let currentPage = 1;
      const itemsPerPage = 8;

      window.renderUsers = function() {
        const tbody = document.getElementById("users-table-body");
        if (!tbody) return;
        
        let htmlString = "";
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const currentUsers = usersMockData.slice(startIndex, endIndex);

        currentUsers.forEach(user => {
          let statusBadge = user.status === 'ACTIVE' 
            ? '<span class="badge bg-success rounded-pill px-3 py-2">ACTIVE</span>'
            : '<span class="badge bg-danger rounded-pill px-3 py-2">LOCKED</span>';
            
          let actionBtn = '';
          if (user.role === 'NORMAL_USER') {
            actionBtn = `
              <button class="btn btn-sm btn-outline-primary border-0" title="Cấp quyền Blog Owner" onclick="if(confirm('Cấp quyền Blog Owner cho user này?')) alert('Đã cấp quyền');">
                <i class="bi bi-arrow-up-circle-fill"></i> Cấp quyền
              </button>
            `;
          } else if (user.role === 'BLOG_OWNER') {
            actionBtn = `
              <button class="btn btn-sm btn-outline-warning border-0 text-dark" title="Tước quyền Blog Owner" onclick="if(confirm('Giáng cấp user này?')) alert('Đã giáng cấp');">
                <i class="bi bi-arrow-down-circle-fill"></i> Tước quyền
              </button>
            `;
          } else {
            actionBtn = `
              <button class="btn btn-sm btn-outline-danger border-0" title="Khóa tài khoản" onclick="if(confirm('Khóa user này?')) alert('Đã khóa');">
                <i class="bi bi-lock-fill"></i> Khóa user
              </button>
            `;
          }

          htmlString += `
              <tr>
                <td class="text-nowrap">
                  <a href="#" class="text-decoration-none text-dark fw-medium" onclick="showUserInfo('${user.email}', '${user.role}', '${user.status}', '${user.roleClass}')">${user.email}</a>
                </td>
                <td class="text-nowrap"><span class="${user.roleClass} fw-semibold">${user.role}</span></td>
                <td class="text-nowrap text-center">${statusBadge}</td>
                <td class="text-nowrap text-center">${actionBtn}</td>
              </tr>
          `;
        });
        
        tbody.innerHTML = htmlString;
        renderPagination();
      }

      function renderPagination() {
        const paginationWrapper = document.getElementById("users-pagination");
        if (!paginationWrapper) return;
        
        const totalPages = Math.ceil(usersMockData.length / itemsPerPage);
        if (totalPages <= 1) {
          paginationWrapper.innerHTML = '';
          return;
        }

        let paginationHtml = '';
        paginationHtml += `
          <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" data-page="${currentPage - 1}">Previous</a>
          </li>
        `;
        for (let i = 1; i <= totalPages; i++) {
          paginationHtml += `
            <li class="page-item ${currentPage === i ? 'active' : ''}">
              <a class="page-link" href="#" data-page="${i}">${i}</a>
            </li>
          `;
        }
        paginationHtml += `
          <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" data-page="${currentPage + 1}">Next</a>
          </li>
        `;
        paginationWrapper.innerHTML = paginationHtml;
        
        const pageLinks = paginationWrapper.querySelectorAll('.page-link');
        pageLinks.forEach(link => {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            const parent = this.parentElement;
            if (parent.classList.contains('disabled') || parent.classList.contains('active')) return;
            const newPage = parseInt(this.getAttribute('data-page'));
            if (!isNaN(newPage)) {
              currentPage = newPage;
              renderUsers();
            }
          });
        });
      }

      window.showUserInfo = function(email, role, status, roleClass) {
        document.getElementById('infoUserEmail').innerText = email;
        document.getElementById('infoUserRole').innerHTML = `<span class="${roleClass}">${role}</span>`;
        document.getElementById('infoUserStatus').innerHTML = status === 'ACTIVE' ? '<span class="text-success">Đang hoạt động</span>' : '<span class="text-danger">Đã bị khóa</span>';
        
        const blogsWrapper = document.getElementById('infoUserBlogs');
        if (role === 'NORMAL_USER') {
          blogsWrapper.innerHTML = `<div class="text-muted text-center py-3">Người dùng này chưa có bài viết nào hoặc không có quyền viết blog.</div>`;
        } else {
          let blogsHtml = '';
          for(let i = 1; i <= 2; i++) {
            blogsHtml += `
              <a href="../../public/post-detail.html" class="list-group-item list-group-item-action bg-transparent">
                <div class="d-flex w-100 justify-content-between">
                  <h6 class="mb-1 fw-bold text-dark">Bài viết demo của ${email} - Phần ${i}</h6>
                  <small class="text-muted">3 ngày trước</small>
                </div>
                <p class="mb-1 text-muted small">Một bài viết ví dụ để hiển thị danh sách blog của user này.</p>
                <small class="text-primary"><i class="bi bi-eye"></i> ${Math.floor(Math.random() * 1000)} lượt xem</small>
              </a>
            `;
          }
          blogsWrapper.innerHTML = blogsHtml;
        }

        const modal = new bootstrap.Modal(document.getElementById('userInfoModal'));
        modal.show();
      };

      renderUsers();
    });
  </script>
</body>

</html>
